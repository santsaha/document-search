# This prototype is intentionally single-service: search runs on an embedded
services:
  document-search:
    build: .
    image: document-search:latest
    ports:
      - "8080:8080"
    volumes:
      - document-search-data:/app/data
    environment:
      - DOCSEARCH_INDEX_BASE-DIR=/app/data/indices
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  document-search-data:
